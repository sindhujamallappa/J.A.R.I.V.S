# J.A.R.I.V.S configuration — single source of truth.
# Loaded and validated by src/jarvis/config.py into typed objects.
# A few keys can be overridden via environment variables (see .env.example).

app:
  name: "J.A.R.I.V.S"

logging:
  level: "INFO"            # DEBUG | INFO | WARNING | ERROR | CRITICAL
  format: "text"           # text | json
  file: "logs/jarvis.log"  # null to disable file logging (console only)
  max_bytes: 5242880       # rotate at 5 MB
  backup_count: 3

audio:
  sample_rate: 16000       # required by openWakeWord AND faster-whisper — leave at 16k
  frame_length: 1280       # 80 ms @ 16 kHz — openWakeWord's expected chunk size
  channels: 1              # mono
  input_device: "Jabra"    # headset mic (Link 390 dongle). Laptop mic: "Microphone Array"; null = system default

wake_word:
  # Wake models listened for simultaneously — ANY of them triggers.
  # Each entry is a bundled openWakeWord model name OR a path to a custom
  # .onnx/.tflite. NOTE: wake phrases are trained MODELS, not free text —
  # adding a phrase like "wake up mommys home" means training a model for it
  # (openWakeWord's synthetic-data pipeline), then listing the file here:
  #   models: ["hey_jarvis", "models/wake/wake_up_mommys_home.onnx"]
  models: ["hey_jarvis"]
  threshold: 0.5                 # detection score in [0,1] to trigger; raise to cut false positives
  inference_framework: "onnx"    # onnx | tflite  (onnx installs cleanly on Windows)
  vad_threshold: 0.0             # silero VAD gate in [0,1]; 0 disables. e.g. 0.5 to require speech
  enable_noise_suppression: false  # speex; needs the speexdsp-ns extra (awkward on Windows)
  trigger_cooldown_sec: 2.0      # ignore re-triggers within this window after a detection
  models_dir: "models"           # where downloaded/custom wake-word models live

safety:
  confirm_unknown_actions: true    # treat unrecognised actions as needing confirmation (fail-safe)
  confirmation_retries: 2          # re-prompts on an unclear yes/no before defaulting to DENY
  confirmation_prompt: "This will {action}. Should I proceed? Say yes or no."
  reprompt: "Sorry, I didn't catch a yes or no. Please say yes or no."
  extra_destructive_actions: []    # extra action names to always treat as destructive
  # affirmatives / negatives use sensible built-in defaults; override with lists if needed.

execution:
  apps: {}                         # friendly name -> executable/path, e.g. {notes: notepad.exe}
  allow_run_command: false         # arbitrary shell exec (gated + logged); OFF by default
  delete_to_trash: true            # delete_file -> Recycle Bin instead of permanent removal
  search_url: "https://www.google.com/search?q={query}"
  read_file_max_chars: 2000        # cap on read_file spoken/returned output

# --- stages below are scaffolded now, wired in later roadmap steps ---

stt:
  model_size: "base"       # faster-whisper: tiny | base | small | medium | large-v3
  device: "cpu"            # cpu | cuda
  compute_type: "int8"     # int8 | int8_float16 | float16 | float32
  language: "en"           # "" to autodetect
  beam_size: 1             # 1 = greedy (fastest); raise for accuracy
  # utterance capture / silence endpointing (int16 RMS domain)
  min_rms_threshold: 100   # noise-floor guard for speech onset (this laptop's mic array is quiet: ambient ~26)
  speech_multiplier: 2.0   # onset threshold = max(min_rms, ambient * this); 2.5 overshot in noisy rooms
  calibration_sec: 0.3     # ambient-noise sampling window at capture start
  silence_duration_sec: 0.8  # trailing silence that ends the utterance
  max_duration_sec: 15.0   # hard cap on a single command
  onset_timeout_sec: 4.0   # give up if no speech starts after the wake word
  preroll_sec: 0.3         # audio retained from just before onset
  models_dir: "models/whisper"  # Whisper model files download here on first run

intent:
  provider: "ollama"
  model: "llama3.2:3b"     # any Ollama model — chosen for CPU-only latency; swap freely
  host: "http://localhost:11434"
  timeout_sec: 60          # must cover a cold model load, not just inference
  temperature: 0.0         # keep low/0 for deterministic JSON
  keep_alive: "30m"        # keep the model in RAM between commands (voice latency)
  max_tokens: 256          # cap on generated intent JSON
  fast_path: true          # instant regex matcher for common commands; LLM handles the rest

tts:
  engine: "piper"
  voice: "en_US-lessac-medium"   # voice name (models_dir/<voice>.onnx) or a .onnx path
  models_dir: "models/piper"
  speaking_rate: 1.0             # >1 faster, <1 slower
  speaker_id: 0                  # for multi-speaker voices
  volume: 1.0

ui:
  enabled: true            # serve the local HUD (arc-reactor status + live logs)
  host: "127.0.0.1"        # loopback only — never expose beyond this machine
  port: 8765
  open_browser: true       # open the HUD in the default browser on start

service:
  task_name: "JARVIS Voice Assistant"   # Windows Task Scheduler task name
  restart_on_crash: true                # app-level supervisor restarts on crash
  restart_backoff_sec: 5.0              # initial restart delay
  restart_backoff_max_sec: 60.0         # cap on exponential backoff
  single_instance: true                 # refuse to start if already running
  run_hidden: true                      # launch via pythonw.exe (no console window)
